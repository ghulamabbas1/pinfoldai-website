# Marketing + legal site — pinfoldai.com / www.pinfoldai.com
# Static files only. Does NOT proxy to the API (api.pinfoldai.com unchanged).
# Install: copy to /etc/nginx/sites-available/pinfold-www.conf and symlink sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name pinfoldai.com www.pinfoldai.com;

    return 301 https://pinfoldai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.pinfoldai.com;

    ssl_certificate     /etc/nginx/ssl/pinfoldai-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/pinfoldai-origin.key;

    return 301 https://pinfoldai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pinfoldai.com;

    ssl_certificate     /etc/nginx/ssl/pinfoldai-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/pinfoldai-origin.key;

    charset utf-8;
    root /var/www/pinfold-www;
    index index.html;

    # Security headers (lightweight static site)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # TikTok Login Kit redirect (verified domain pinfoldai.com) -> unified API on :8080
    location = /api/social/oauth/meta-callback {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host api.pinfoldai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # TikTok Login Kit redirect (optional alternate host) -> unified API on :8080
    location = /api/social/oauth/tiktok-callback {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host api.pinfoldai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
